<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOX - Update Available</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0c;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.05) 0%, rgba(0,0,0,0) 50%);
            z-index: -1;
            animation: pulse 8s infinite alternate;
        }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
            background: rgba(18, 18, 22, 0.8);
            border-radius: 24px;
            border: 1px solid rgba(0, 245, 212, 0.2);
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 60px rgba(0, 245, 212, 0.05);
            backdrop-filter: blur(20px);
        }
        .icon {
            font-size: 72px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
        }
        h1 span { color: #00f5d4; text-shadow: 0 0 30px rgba(0, 245, 212, 0.4); }
        .subtitle {
            color: #a0a0b0;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .version-box {
            background: rgba(0, 245, 212, 0.05);
            border: 1px solid rgba(0, 245, 212, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
        }
        .version-box .label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .version-box .version {
            font-size: 28px;
            font-weight: 900;
            color: #00f5d4;
            text-shadow: 0 0 20px rgba(0, 245, 212, 0.3);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #00f5d4;
            color: #0a0a0c;
            box-shadow: 0 0 25px rgba(0, 245, 212, 0.3);
            flex: 1;
            min-width: 140px;
        }
        .btn-primary:hover {
            background: #5effeb;
            transform: translateY(-3px);
            box-shadow: 0 5px 35px rgba(0, 245, 212, 0.5);
        }
        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
            flex: 1;
            min-width: 100px;
        }
        .btn-secondary:hover {
            border-color: #00f5d4;
            background: rgba(0, 245, 212, 0.05);
            transform: translateY(-3px);
        }
        .features {
            margin-top: 25px;
            text-align: left;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .features li {
            list-style: none;
            color: #a0a0b0;
            font-size: 14px;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .features li::before {
            content: '▹';
            color: #00f5d4;
            font-size: 18px;
        }
        @media(max-width: 500px) {
            .container { padding: 30px 15px; margin: 20px; }
            h1 { font-size: 26px; }
            .icon { font-size: 56px; }
            .btn { padding: 12px 25px; font-size: 14px; }
            .version-box .version { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="icon">🔄</div>
        <h1>VELO<span>X</span></h1>
        <p class="subtitle">A new version is ready to download!</p>

        <div class="version-box">
            <div class="label">Latest Version</div>
            <div class="version">v1.1</div>
        </div>

        <div class="features">
            <li>Improved performance & stability</li>
            <li>Fixed connection issues</li>
            <li>Added new features</li>
            <li>Enhanced user experience</li>
        </div>

        <div style="margin-top: 30px;">
            <div class="btn-group">
                <a href="https://rizdexstudio.github.io/velox-site/velox.apk" class="btn btn-primary" download>⬇️ Download Update</a>
                <a href="https://rizdexstudio.github.io/velox-site/" class="btn btn-secondary">🏠 Home</a>
            </div>
        </div>

        <p style="margin-top: 20px; font-size: 12px; color: #444;">
            Version 1.1 • Released June 2026
        </p>
    </div>
</body>
</html>
