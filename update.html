<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOX - Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0c;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bg-glow {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.05) 0%, rgba(0,0,0,0) 50%);
            z-index: -1;
            animation: pulse 8s infinite alternate;
        }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        .container {
            text-align: center;
            padding: 30px 25px;
            max-width: 380px;
            background: rgba(18, 18, 22, 0.85);
            border-radius: 16px;
            border: 1px solid rgba(0, 245, 212, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 20px;
        }
        h1 span { color: #00f5d4; text-shadow: 0 0 30px rgba(0, 245, 212, 0.3); }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 32px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #00f5d4;
            color: #0a0a0c;
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.2);
            flex: 1;
            min-width: 120px;
        }
        .btn-primary:hover {
            background: #5effeb;
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(0, 245, 212, 0.4);
        }
        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.15);
            flex: 1;
            min-width: 80px;
        }
        .btn-secondary:hover {
            border-color: #00f5d4;
            background: rgba(0, 245, 212, 0.05);
            transform: translateY(-2px);
        }
        @media(max-width: 420px) {
            .container { padding: 20px 15px; max-width: 300px; }
            h1 { font-size: 26px; }
            .btn { padding: 10px 20px; font-size: 13px; min-width: 80px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <h1>VELO<span>X</span></h1>

        <div class="btn-group">
            <a href="https://rizdexstudio.github.io/velox-site/Velox.apk" class="btn btn-primary" download>Download Update</a>
            <a href="https://rizdexstudio.github.io/velox-site/" class="btn btn-secondary">Home</a>
        </div>
    </div>
</body>
</html>
